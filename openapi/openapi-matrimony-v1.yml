openapi: 3.0.3
info:
  title: Matrimony Backend API
  version: 1.0.0
  description: |
    OpenAPI contract for Matrimony backend domain APIs.
    Authentication and authorization endpoints are intentionally excluded
    and are served by the userauth module.
  contact:
    name: Matrimony Support
    url: https://matrimony.local
    email: support@matrimony.local
servers:
  - url: http://localhost:8085
    description: Local mm backend

security:
  - bearerAuth: []

tags:
  - name: Health
  - name: UserProfile
  - name: Discovery
  - name: Interests
  - name: Shortlists
  - name: Photos
  - name: Biodata
  - name: Admin


paths:
  /api/matrimony/photos/profile:
    post:
      tags: [Photos]
      summary: Upload or replace profile photo
      operationId: uploadProfilePhoto
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '200':
          description: Profile photo uploaded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PhotoResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
      security:
        - bearerAuth: []

  /api/matrimony/photos/gallery:
    get:
      tags: [Photos]
      summary: List my gallery photos
      operationId: listGalleryPhotos
      responses:
        '200':
          description: Gallery photo list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PhotoListResponse'
      security:
        - bearerAuth: []
    post:
      tags: [Photos]
      summary: Upload a gallery photo
      operationId: uploadGalleryPhoto
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '200':
          description: Gallery photo uploaded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PhotoResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
      security:
        - bearerAuth: []

  /api/matrimony/photos/gallery/{photoId}:
    delete:
      tags: [Photos]
      summary: Delete a gallery photo
      operationId: deleteGalleryPhoto
      parameters:
        - name: photoId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Photo deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessageResponse'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
        - bearerAuth: []

  /api/matrimony/photos/identifier/{photoIdentifier}:
    get:
      tags: [Photos]
      summary: Get photo content by photo identifier
      operationId: getPhotoDataByIdentifier
      parameters:
        - name: photoIdentifier
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Photo content fetched
          content:
            image/jpeg:
              schema:
                type: string
                format: binary
            image/png:
              schema:
                type: string
                format: binary
            image/webp:
              schema:
                type: string
                format: binary
        '404':
          $ref: '#/components/responses/NotFound'
      security:
        - bearerAuth: []

  /api/matrimony/biodata:
    post:
      tags: [Biodata]
      summary: Upload or replace my biodata PDF
      operationId: uploadBiodata
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: PDF file only, max 10 MB
      responses:
        '200':
          description: Biodata uploaded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessageResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
      security:
        - bearerAuth: []
    get:
      tags: [Biodata]
      summary: Download my own biodata PDF
      operationId: downloadMyBiodata
      responses:
        '200':
          description: Biodata PDF file
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        '404':
          $ref: '#/components/responses/NotFound'
      security:
        - bearerAuth: []
    delete:
      tags: [Biodata]
      summary: Delete my biodata PDF
      operationId: deleteMyBiodata
      responses:
        '200':
          description: Biodata deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessageResponse'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
        - bearerAuth: []

  /api/matrimony/biodata/{profileId}:
    get:
      tags: [Biodata]
      summary: Download biodata PDF for a given profile
      operationId: downloadBiodataByProfileId
      parameters:
        - name: profileId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Biodata PDF file
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        '404':
          $ref: '#/components/responses/NotFound'
      security:
        - bearerAuth: []

  # ── Admin: Dashboard ──────────────────────────────────────────────────────
  /api/admin/dashboard/stats:
    get:
      tags: [Admin]
      summary: Get dashboard statistics
      operationId: getDashboardStats
      responses:
        '200':
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardStatsResponse'
      security:
        - bearerAuth: []

  # ── Admin: User Management ─────────────────────────────────────────────────
  /api/admin/users:
    get:
      tags: [Admin]
      summary: List / search users
      operationId: adminListUsers
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
        - name: email
          in: query
          schema:
            type: string
        - name: name
          in: query
          schema:
            type: string
        - name: verificationStatus
          in: query
          schema:
            $ref: '#/components/schemas/VerificationStatus'
        - name: active
          in: query
          schema:
            type: boolean
      responses:
        '200':
          description: User list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminUserPageResponse'
      security:
        - bearerAuth: []

  /api/admin/users/{userId}:
    get:
      tags: [Admin]
      summary: Get user details
      operationId: adminGetUser
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: User details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminUserResponse'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
        - bearerAuth: []

  /api/admin/users/{userId}/activate:
    patch:
      tags: [Admin]
      summary: Activate a user account
      operationId: adminActivateUser
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: User activated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminUserResponse'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
        - bearerAuth: []

  /api/admin/users/{userId}/deactivate:
    patch:
      tags: [Admin]
      summary: Deactivate a user account
      operationId: adminDeactivateUser
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: User deactivated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminUserResponse'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
        - bearerAuth: []

  /api/admin/users/{userId}/verification-status:
    patch:
      tags: [Admin]
      summary: Manually set verification status of a user
      operationId: adminSetUserVerificationStatus
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetVerificationStatusRequest'
      responses:
        '200':
          description: Verification status updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminUserResponse'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
        - bearerAuth: []

  # ── Admin: Profile Management ──────────────────────────────────────────────
  /api/admin/profiles:
    get:
      tags: [Admin]
      summary: List / search matrimony profiles
      operationId: adminListProfiles
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
        - name: fullName
          in: query
          schema:
            type: string
        - name: gender
          in: query
          schema:
            $ref: '#/components/schemas/Gender'
        - name: religion
          in: query
          schema:
            type: string
        - name: city
          in: query
          schema:
            type: string
        - name: verified
          in: query
          schema:
            type: boolean
      responses:
        '200':
          description: Profile list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfilePageResponse'
      security:
        - bearerAuth: []

  /api/admin/profiles/{profileId}/verify:
    patch:
      tags: [Admin]
      summary: Verify a matrimony profile
      operationId: adminVerifyProfile
      parameters:
        - name: profileId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Profile verified
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessageResponse'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
        - bearerAuth: []

  /api/admin/profiles/{profileId}/unverify:
    patch:
      tags: [Admin]
      summary: Remove verification from a matrimony profile
      operationId: adminUnverifyProfile
      parameters:
        - name: profileId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Profile unverified
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessageResponse'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
        - bearerAuth: []

  /api/admin/profiles/{profileId}:
    delete:
      tags: [Admin]
      summary: Delete a matrimony profile
      operationId: adminDeleteProfile
      parameters:
        - name: profileId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Profile deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessageResponse'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
        - bearerAuth: []

  /api/health:
    get:
      tags: [Health]
      summary: Health probe endpoint
      operationId: getHealth
      security: []
      responses:
        '200':
          description: Service health
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /api/matrimony/discovery/profiles:
    get:
      tags: [Discovery]
      summary: Search and discover matrimony profiles
      operationId: discoverMatrimonyProfiles
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
        - name: gender
          in: query
          schema:
            $ref: '#/components/schemas/Gender'
        - name: maritalStatus
          in: query
          schema:
            $ref: '#/components/schemas/MaritalStatus'
        - name: religion
          in: query
          schema:
            type: string
            maxLength: 60
        - name: caste
          in: query
          schema:
            type: string
            maxLength: 60
        - name: motherTongue
          in: query
          schema:
            type: string
            maxLength: 60
        - name: city
          in: query
          schema:
            type: string
            maxLength: 80
        - name: education
          in: query
          description: Filter by one or more education keys (picklist name=EDUCATION)
          style: form
          explode: true
          schema:
            type: array
            items:
              type: string
        - name: occupation
          in: query
          description: Filter by one or more occupation keys (picklist name=OCCUPATION)
          style: form
          explode: true
          schema:
            type: array
            items:
              type: string
        - name: minAge
          in: query
          schema:
            type: integer
            minimum: 18
            maximum: 80
        - name: maxAge
          in: query
          schema:
            type: integer
            minimum: 18
            maximum: 80
      responses:
        '200':
          description: Profile discovery page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfilePageResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/matrimony/discovery/religions:
    get:
      tags: [Discovery]
      summary: List active religion values for discovery filter
      operationId: listDiscoveryReligions
      responses:
        '200':
          description: Religion values fetched
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StringListResponse'

  /api/matrimony/discovery/educations:
    get:
      tags: [Discovery]
      summary: Search active education values for discovery autocomplete
      operationId: searchDiscoveryEducations
      parameters:
        - name: query
          in: query
          schema:
            type: string
            maxLength: 100
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 20
            default: 10
      responses:
        '200':
          description: Education values fetched
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StringListResponse'

  /api/matrimony/interests:
    post:
      tags: [Interests]
      summary: Express interest to a profile
      operationId: sendInterest
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateInterestRequest'
      responses:
        '201':
          description: Interest created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InterestResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/matrimony/interests/sent:
    get:
      tags: [Interests]
      summary: List interests sent by current user
      operationId: listSentInterests
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
      responses:
        '200':
          description: Sent interest page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InterestPageResponse'

  /api/matrimony/interests/received:
    get:
      tags: [Interests]
      summary: List interests received by current user
      operationId: listReceivedInterests
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
      responses:
        '200':
          description: Received interest page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InterestPageResponse'

  /api/matrimony/interests/{interestId}/status:
    patch:
      tags: [Interests]
      summary: Update status of a received interest
      operationId: updateInterestStatus
      parameters:
        - name: interestId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateInterestStatusRequest'
      responses:
        '200':
          description: Interest status updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InterestResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/matrimony/shortlists:
    get:
      tags: [Shortlists]
      summary: List shortlisted profiles for current user
      operationId: listShortlistedProfiles
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
      responses:
        '200':
          description: Shortlist page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfilePageResponse'

  /api/matrimony/shortlists/{profileId}:
    put:
      tags: [Shortlists]
      summary: Add a profile to shortlist
      operationId: addProfileToShortlist
      parameters:
        - name: profileId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Profile shortlisted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessageResponse'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Shortlists]
      summary: Remove a profile from shortlist
      operationId: removeProfileFromShortlist
      parameters:
        - name: profileId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Profile removed from shortlist
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessageResponse'

  /api/users/profile/extended/me:
    get:
      tags: [UserProfile]
      summary: Get current user's matrimony profile
      operationId: getMyMatrimonyProfile
      responses:
        '200':
          description: Profile fetched
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileDetailResponse'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [UserProfile]
      summary: Upsert current user's matrimony profile
      operationId: upsertMyMatrimonyProfile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpsertMyProfileRequest'
      responses:
        '200':
          description: Profile saved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileDetailResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/users/profile/extended/me/basic-details:
    patch:
      tags: [UserProfile]
      summary: Update current user's basic profile details
      operationId: updateMyMatrimonyProfileBasicDetails
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateBasicDetailsRequest'
      responses:
        '200':
          description: Basic details saved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileDetailResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/users/profile/extended/me/community-details:
    patch:
      tags: [UserProfile]
      summary: Update current user's community details
      operationId: updateMyMatrimonyProfileCommunityDetails
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCommunityDetailsRequest'
      responses:
        '200':
          description: Community details saved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileDetailResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/users/profile/extended/me/professional-details:
    patch:
      tags: [UserProfile]
      summary: Update current user's professional details
      operationId: updateMyMatrimonyProfileProfessionalDetails
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfessionalDetailsRequest'
      responses:
        '200':
          description: Professional details saved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileDetailResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/users/profile/extended/me/horoscope-details:
    patch:
      tags: [UserProfile]
      summary: Update current user's horoscope details
      operationId: updateMyMatrimonyProfileHoroscopeDetails
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateHoroscopeDetailsRequest'
      responses:
        '200':
          description: Horoscope details saved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileDetailResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/users/profile/extended/me/family-details:
    patch:
      tags: [UserProfile]
      summary: Update current user's family details
      operationId: updateMyMatrimonyProfileFamilyDetails
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateFamilyDetailsRequest'
      responses:
        '200':
          description: Family details saved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileDetailResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/users/profile/extended/me/partner-preferences:
    patch:
      tags: [UserProfile]
      summary: Update current user's partner preferences
      operationId: updateMyMatrimonyProfilePartnerPreferences
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePartnerPreferencesRequest'
      responses:
        '200':
          description: Partner preferences saved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileDetailResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/users/profile/extended/me/privacy-settings:
    patch:
      tags: [UserProfile]
      summary: Update current user's privacy and verification settings
      operationId: updateMyMatrimonyProfilePrivacySettings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePrivacyVerificationRequest'
      responses:
        '200':
          description: Privacy settings saved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileDetailResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/users/profile/extended/{referenceId}:
    get:
      tags: [UserProfile]
      summary: Get profile details by reference id
      operationId: getMatrimonyProfileByReferenceId
      parameters:
        - name: referenceId
          in: path
          required: true
          schema:
            type: string
            pattern: '^VVK[MFO][A-Z]{2}[0-9]{4}$'
      responses:
        '200':
          description: Profile fetched
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileDetailWithConnectionResponse'
        '404':
          $ref: '#/components/responses/NotFound'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    PageParam:
      name: page
      in: query
      description: 1-based page index
      schema:
        type: integer
        minimum: 1
        default: 1
    SizeParam:
      name: size
      in: query
      description: Page size
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20

  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiErrorResponse'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiErrorResponse'

  schemas:
    Gender:
      type: string
      enum: [MALE, FEMALE, OTHER]

    MaritalStatus:
      type: string
      enum: [NEVER_MARRIED, DIVORCED, WIDOWED, AWAITING_DIVORCE]

    InterestStatus:
      type: string
      enum: [SENT, ACCEPTED, DECLINED, WITHDRAWN]

    DietType:
      type: string
      enum: [VEGETARIAN, EGGETARIAN, NON_VEGETARIAN, VEGAN, JAIN, OCCASIONALLY_NON_VEG]

    EmploymentType:
      type: string
      enum: [PRIVATE, GOVERNMENT, BUSINESS, SELF_EMPLOYED, NOT_WORKING, STUDENT]

    FamilyType:
      type: string
      enum: [NUCLEAR, JOINT, EXTENDED]

    FamilyValues:
      type: string
      enum: [TRADITIONAL, MODERATE, LIBERAL]

    ProfileVisibility:
      type: string
